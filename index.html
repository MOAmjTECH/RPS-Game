<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <Link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background decoration -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Confetti (toggled by JS) -->
  <div class="confetti-wrap" id="confetti">
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
    <div class="confetti-piece"></div><div class="confetti-piece"></div>
  </div>

  <main>

    <!-- Header -->
    <header>
      <p class="kicker">Choose your weapon</p>
      <h1>Rock Paper<br>Scissors</h1>
    </header>

    <!-- Score -->
    <div class="scoreboard">
      <div class="score-col player">
        <div class="score-label">You</div>
        <div class="score-value" id="scorePlayer">0</div>
      </div>
      <div class="score-divider"></div>
      <div class="vs-badge">VS</div>
      <div class="score-divider"></div>
      <div class="score-col cpu">
        <div class="score-label">AXIOM 🤖</div>
        <div class="score-value" id="scoreCpu">0</div>
      </div>
    </div>

    <!-- Arena -->
    <div class="arena">
      <div class="arena-side">
        <div class="arena-label">Your pick</div>
        <div class="choice-display idle" id="playerDisplay">❓</div>
      </div>

      <div class="arena-vs">
        <span>VS</span>
        <div class="flash-dot"></div>
        <div class="flash-dot"></div>
        <div class="flash-dot"></div>
      </div>

      <div class="arena-side">
        <div class="arena-label">AXIOM's pick</div>
        <div class="choice-display idle" id="cpuDisplay">❓</div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-banner">
      <div class="result-text" id="resultText">—</div>
    </div>

    <!-- Choice cards -->
    <div class="choices">
      <button class="choice-card rock" data-choice="rock">
        <div class="choice-card-inner">
          <span class="choice-emoji">🪨</span>
          <span class="choice-name">Rock</span>
        </div>
      </button>
      <button class="choice-card paper" data-choice="paper">
        <div class="choice-card-inner">
          <span class="choice-emoji">📄</span>
          <span class="choice-name">Paper</span>
        </div>
      </button>
      <button class="choice-card scissors" data-choice="scissors">
        <div class="choice-card-inner">
          <span class="choice-emoji">✂️</span>
          <span class="choice-name">Scissors</span>
        </div>
      </button>
    </div>

    <!-- Reset -->
    <button class="btn-reset" id="btnReset">↺ Reset Score</button>

    <!-- History dots -->
    <div class="history">
      <div class="history-title">Round history</div>
      <div class="history-dots" id="historyDots">
        <!-- JS populates: .hdot.win / .lose / .draw -->
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
        <div class="hdot"></div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
